/* ============================== SEARCH AUTOCOMPLETE ============================== */
function SearchBox({ small }) {
  const { navigate, search, setSearch } = useApp();
  const [open, setOpen] = useState(false);
  const q = search.trim().toLowerCase();
  const prodMatches = q.length >= 2 ? PRODUCTS.filter((p) => (p.name + ' ' + p.brand + ' ' + p.model).toLowerCase().includes(q)).slice(0, 6) : [];
  const catMatches = q.length >= 2 ? CATEGORIES.filter((c) => c.label.toLowerCase().includes(q)) : [];
  const hasResults = prodMatches.length > 0 || catMatches.length > 0;

  const submit = (e) => {
    e.preventDefault();
    if (search.trim()) { navigate('category', { query: search }); setOpen(false); }
  };
  const go = (fn) => { fn(); setOpen(false); };

  return (
    <form onSubmit={submit} className="relative w-full">
      <input value={search}
        onChange={(e) => { setSearch(e.target.value); setOpen(true); }}
        onFocus={() => setOpen(true)}
        onBlur={() => setTimeout(() => setOpen(false), 150)}
        placeholder={small ? 'Busca en Alkosto…' : 'Busca neveras, cocinas, TVs y más…'}
        className={'w-full rounded-full border border-neutral-300 bg-neutral-50 pl-4 text-sm focus:outline-none focus:ring-2 focus:ring-brand/50 focus:border-brand ' + (small ? 'pr-11 py-2' : 'pr-11 py-2.5')} />
      <button type="submit" aria-label="Buscar" className={'absolute right-1 top-1 bottom-1 rounded-full bg-brand hover:bg-brand-dark text-white flex items-center justify-center ' + (small ? 'w-8' : 'w-9')}>
        <svg viewBox="0 0 24 24" className="w-4 h-4" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"><circle cx="11" cy="11" r="7" /><path d="m20 20-3.5-3.5" /></svg>
      </button>

      {open && q.length >= 2 && (
        <div className="drop-enter absolute top-full left-0 right-0 mt-2 bg-white rounded-2xl border border-neutral-200 shadow-xl z-50 overflow-hidden">
          {!hasResults && (
            <p className="px-4 py-4 text-sm text-neutral-500">Sin resultados para “{search}”. Prueba con otra palabra o <a href={WHATSAPP} target="_blank" rel="noopener" className="text-green-600 font-bold">consúltanos por WhatsApp</a>.</p>
          )}
          {catMatches.map((c) => (
            <button key={c.id} type="button" onMouseDown={() => go(() => navigate('category', { cat: c.id }))}
              className="w-full flex items-center gap-3 px-4 py-2.5 hover:bg-brand-light text-left">
              <CategoryIcon id={c.id} className="w-5 h-5 text-brand shrink-0" />
              <span className="text-sm font-bold flex-1">{c.label}</span>
              <span className="text-[10px] uppercase tracking-wide text-neutral-400 font-bold">Departamento</span>
            </button>
          ))}
          {catMatches.length > 0 && prodMatches.length > 0 && <div className="border-t border-neutral-100"></div>}
          {prodMatches.map((p) => (
            <button key={p.id} type="button" onMouseDown={() => go(() => navigate('product', { id: p.id }))}
              className="w-full flex items-center gap-3 px-4 py-2.5 hover:bg-neutral-50 text-left">
              <ProductImage p={p} className="w-10 h-10 rounded-lg text-lg shrink-0" />
              <span className="flex-1 min-w-0">
                <span className="block text-sm font-semibold leading-snug truncate">{p.name}</span>
                <span className="block text-[11px] text-neutral-400">{p.brand} · {p.model}</span>
              </span>
              <span className="text-sm font-extrabold text-brand whitespace-nowrap">{usd(p.price)}</span>
            </button>
          ))}
          {hasResults && (
            <button type="button" onMouseDown={() => go(() => navigate('category', { query: search }))}
              className="w-full px-4 py-3 text-sm font-bold text-brand hover:bg-brand-light text-left border-t border-neutral-100">
              Ver todos los resultados para “{search}” →
            </button>
          )}
        </div>
      )}
    </form>
  );
}

/* ============================== CATEGORY ============================== */
function CategoryPage({ cat = 'cocinas', query, ofertas }) {
  const { navigate } = useApp();
  const catInfo = CATEGORIES.find((c) => c.id === cat) || CATEGORIES[3];
  const [fBrands, setFBrands] = useState([]);
  const [maxPrice, setMaxPrice] = useState(3000);
  const [fTipos, setFTipos] = useState([]);
  const [fVolts, setFVolts] = useState([]);
  const [fLocs, setFLocs] = useState([]);
  const [sort, setSort] = useState('relevancia');
  const [showFilters, setShowFilters] = useState(false);

  const toggle = (arr, set, v) => set(arr.includes(v) ? arr.filter((x) => x !== v) : [...arr, v]);

  const base = ofertas
    ? PRODUCTS.filter((p) => p.oldPrice)
    : query
      ? PRODUCTS.filter((p) => (p.name + ' ' + p.brand + ' ' + p.model).toLowerCase().includes(query.toLowerCase()))
      : PRODUCTS.filter((p) => p.cat === cat);

  const brandOpts = [...new Set(base.map((p) => p.brand))];
  const showTipo = !query && !ofertas && cat === 'cocinas';
  const title = ofertas ? '🔥 Ofertas de la semana' : query ? `Resultados para “${query}”` : catInfo.label;

  let items = base.filter((p) =>
    (fBrands.length === 0 || fBrands.includes(p.brand)) &&
    p.price <= maxPrice &&
    (fTipos.length === 0 || fTipos.includes(p.tipo)) &&
    (fVolts.length === 0 || fVolts.includes(p.volt)) &&
    (fLocs.length === 0 || fLocs.some((l) => p.locs.includes(l)))
  );
  if (sort === 'menor') items = [...items].sort((a, b) => a.price - b.price);
  if (sort === 'mayor') items = [...items].sort((a, b) => b.price - a.price);
  if (sort === 'vendidos') items = [...items].sort((a, b) => b.sales - a.sales);

  const FilterGroup = ({ title, children }) => (
    <div className="border-b border-neutral-200 pb-4 mb-4 last:border-0">
      <h4 className="text-xs uppercase tracking-wider font-bold text-neutral-500 mb-2.5">{title}</h4>
      {children}
    </div>
  );
  const Check = ({ label, checked, onChange }) => (
    <label className="flex items-center gap-2.5 py-1 text-sm cursor-pointer hover:text-brand">
      <input type="checkbox" checked={checked} onChange={onChange} className="w-4 h-4 rounded border-neutral-300 accent-[#E8651A]" />
      {label}
    </label>
  );

  const sidebar = (
    <div className="bg-white rounded-2xl border border-neutral-200 p-5">
      <FilterGroup title="Marca">
        {brandOpts.map((b) => (
          <Check key={b} label={b} checked={fBrands.includes(b)} onChange={() => toggle(fBrands, setFBrands, b)} />
        ))}
      </FilterGroup>
      <FilterGroup title="Precio">
        <input type="range" min="0" max="3000" step="50" value={maxPrice} onChange={(e) => setMaxPrice(+e.target.value)} className="w-full" />
        <div className="flex justify-between text-xs text-neutral-500 mt-1">
          <span>$0</span><span className="font-bold text-brand">Hasta {usd(maxPrice)}</span><span>$3,000</span>
        </div>
      </FilterGroup>
      {showTipo && (
        <FilterGroup title="Tipo">
          {['Tope de cocina', 'Horno empotrable', 'Cocina completa'].map((t) => (
            <Check key={t} label={t} checked={fTipos.includes(t)} onChange={() => toggle(fTipos, setFTipos, t)} />
          ))}
        </FilterGroup>
      )}
      <FilterGroup title="Voltaje">
        {['110V', '220V'].map((v) => (
          <Check key={v} label={v} checked={fVolts.includes(v)} onChange={() => toggle(fVolts, setFVolts, v)} />
        ))}
      </FilterGroup>
      <FilterGroup title="Disponibilidad">
        <Check label="Disponible en Las Mercedes" checked={fLocs.includes('mercedes')} onChange={() => toggle(fLocs, setFLocs, 'mercedes')} />
        <Check label="Disponible en Chacao" checked={fLocs.includes('chacao')} onChange={() => toggle(fLocs, setFLocs, 'chacao')} />
      </FilterGroup>
    </div>
  );

  return (
    <main className="page-enter max-w-7xl mx-auto px-4 mt-6">
      <nav className="text-sm text-neutral-500 mb-4">
        <button onClick={() => navigate('home')} className="hover:text-brand">Inicio</button>
        <span className="mx-2">›</span>
        <span className="font-semibold text-ink">{ofertas ? 'Ofertas' : query ? 'Búsqueda' : catInfo.label}</span>
      </nav>
      <div className="flex items-center justify-between gap-3 mb-5 flex-wrap">
        <h1 className="text-2xl md:text-3xl font-extrabold">{title}</h1>
        <div className="flex items-center gap-2.5">
          <button onClick={() => setShowFilters(!showFilters)} className="lg:hidden text-sm font-bold border border-neutral-300 rounded-full px-4 py-2 bg-white">⚙ Filtros</button>
          <select value={sort} onChange={(e) => setSort(e.target.value)} className="text-sm font-semibold border border-neutral-300 rounded-full px-4 py-2 bg-white focus:outline-none focus:ring-2 focus:ring-brand/40">
            <option value="relevancia">Relevancia</option>
            <option value="menor">Menor precio</option>
            <option value="mayor">Mayor precio</option>
            <option value="vendidos">Más vendidos</option>
          </select>
        </div>
      </div>
      <div className="flex gap-6 items-start">
        <aside className="hidden lg:block w-64 shrink-0 sticky top-44">{sidebar}</aside>
        {showFilters && <div className="lg:hidden fixed inset-0 z-50 bg-black/40" onClick={() => setShowFilters(false)}>
          <div className="absolute left-0 top-0 bottom-0 w-80 max-w-[85vw] bg-neutral-100 p-4 overflow-y-auto" onClick={(e) => e.stopPropagation()}>

  );
}

/* ============================== CHECKOUT ============================== */
function Stepper({ step }) {
  const steps = ['Entrega', 'Pago', 'Confirmación'];
  return (
    <div className="flex items-center justify-center gap-2 md:gap-4 mb-8">
      {steps.map((s, i) => {
        const n = i + 1;
        const state = n < step ? 'done' : n === step ? 'active' : 'todo';
        return (
          <React.Fragment key={s}>
            {i > 0 && <div className={'h-0.5 w-8 md:w-16 rounded ' + (n <= step ? 'bg-brand' : 'bg-neutral-300')}></div>}
            <div className="flex items-center gap-2">
              <span className={'w-8 h-8 rounded-full flex items-center justify-center text-sm font-bold ' +
                (state === 'done' ? 'bg-brand text-white' : state === 'active' ? 'bg-brand text-white ring-4 ring-brand/20' : 'bg-neutral-200 text-neutral-500')}>
                {state === 'done' ? '✓' : n}
              </span>
              <span className={'text-xs md:text-sm font-bold hidden sm:inline ' + (state === 'todo' ? 'text-neutral-400' : 'text-ink')}>{s}</span>
            </div>
          </React.Fragment>
        );
      })}
    </div>
  );
}

const PAY_METHODS = [
  { id: 'tarjeta', icon: '💳', title: 'Tarjeta internacional', sub: 'Visa / Mastercard / Amex' },
  { id: 'pagomovil', icon: '📱', title: 'Pago Móvil', sub: 'Transferencia bancaria inmediata' },
  { id: 'zelle', icon: '💵', title: 'Zelle', sub: 'Transferencia en dólares desde EE.UU.' },
  { id: 'transferencia', icon: '🏦', title: 'Transferencia bancaria', sub: 'Banesco / Mercantil / Venezuela' },
  { id: 'cashea', icon: '📲', title: 'Cashea', sub: 'Compra ahora, paga después' },
  { id: 'efectivo', icon: '💶', title: 'Efectivo en tienda', sub: 'Paga al retirar en la sucursal' },
];

const inputCls = 'w-full rounded-xl border border-neutral-300 bg-white px-3.5 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-brand/50 focus:border-brand';

function Checkout() {
  const { navigate, cart, clearCart, myStore } = useApp();
  const [step, setStep] = useState(1);
  const [mode, setMode] = useState('retiro');
  const [store, setStore] = useState(myStore || 'mercedes');
  const [form, setForm] = useState({ nombre: '', telefono: '', direccion: '', ciudad: 'Caracas', estado: 'Distrito Capital' });
  const [pay, setPay] = useState(null);
  const [casheaFaq, setCasheaFaq] = useState(false);
  const [order, setOrder] = useState(null);

  const lines = cart.map((l) => ({ ...l, p: PRODUCTS.find((p) => p.id === l.id) }));
  const subtotal = lines.reduce((a, l) => a + l.p.price * l.qty, 0);
  const set = (k) => (e) => setForm({ ...form, [k]: e.target.value });
  const canStep1 = form.nombre.trim() && form.telefono.trim() && (mode === 'retiro' || form.direccion.trim());

  const confirm = () => {
    setOrder({ lines, subtotal, mode, store, pay, nombre: form.nombre });
    clearCart();
    setStep(3);
    window.scrollTo({ top: 0 });
  };

  if (lines.length === 0 && !order) {
    return (
      <main className="page-enter max-w-3xl mx-auto px-4 mt-16 text-center">
        <p className="text-6xl mb-4">🛒</p>
        <h1 className="text-2xl font-extrabold">No tienes productos en el carrito</h1>
        <button onClick={() => navigate('category', { ofertas: true })} className="mt-6 bg-brand hover:bg-brand-dark text-white font-bold rounded-full px-8 py-3.5">Explorar ofertas</button>
      </main>
    );
  }

  const summary = (data) => (
    <aside className="bg-white border border-neutral-200 rounded-2xl p-5 lg:sticky lg:top-44">
      <h2 className="font-extrabold text-base mb-3">Tu pedido</h2>
      <div className="space-y-2.5">
        {(data || lines).map((l) => (
          <div key={l.id} className="flex items-center gap-3 text-sm">
            <ProductImage p={l.p} className="w-11 h-11 rounded-lg text-lg shrink-0" />
            <span className="flex-1 leading-snug line-clamp-2 text-[13px]">{l.p.name}</span>
            <span className="text-neutral-400 text-xs">×{l.qty}</span>
            <span className="font-bold text-[13px]">{usd(l.p.price * l.qty)}</span>
          </div>
        ))}
      </div>
      <div className="border-t border-neutral-200 mt-4 pt-3 space-y-1.5 text-sm">
        <div className="flex justify-between"><span className="text-neutral-500">Subtotal</span><span className="font-semibold">{usd(data ? order.subtotal : subtotal)}</span></div>
        <div className="flex justify-between"><span className="text-neutral-500">Envío</span><span className="font-semibold text-green-600">{(data ? order.mode : mode) === 'retiro' ? 'Gratis (retiro)' : 'Gratis (Caracas)'}</span></div>
      </div>
      <div className="border-t border-neutral-200 mt-3 pt-3">
        <div className="flex justify-between items-baseline">
          <span className="font-bold">Total</span>
          <span className="text-2xl font-extrabold text-brand">{usd(data ? order.subtotal : subtotal)}</span>
        </div>
        <p className="text-right text-xs text-neutral-400">{bsEq(data ? order.subtotal : subtotal)}</p>
      </div>
      <div className="mt-3 bg-yellow-50 border border-yellow-200 rounded-xl px-3 py-2 text-[11px]">
        <span className="bg-yellow-400 text-black font-extrabold rounded px-1 py-0.5 mr-1">Cashea</span>
        Divide en 6 cuotas desde <strong>${cuotaMes(data ? order.subtotal : subtotal)}/mes</strong>
      </div>
    </aside>
  );

  /* STEP 3 — Confirmation */
  if (step === 3 && order) {
    const storeInfo = STORES.find((s) => s.id === order.store);
    return (
      <main className="page-enter max-w-3xl mx-auto px-4 mt-8">
        <Stepper step={3} />
        <div className="bg-white border border-neutral-200 rounded-3xl p-8 md:p-12 text-center">
          <div className="w-20 h-20 mx-auto rounded-full bg-brand-light flex items-center justify-center">
            <svg viewBox="0 0 24 24" className="w-10 h-10" fill="none" stroke="#E8651A" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><path d="m4 12.5 5 5L20 6.5" /></svg>

          <div className="mt-7 text-left bg-neutral-50 rounded-2xl p-5 space-y-3">
            {order.lines.map((l) => (
              <div key={l.id} className="flex items-center gap-3 text-sm">
                <ProductImage p={l.p} className="w-11 h-11 rounded-lg text-lg shrink-0" />
                <span className="flex-1 leading-snug">{l.p.name} <span className="text-neutral-400">×{l.qty}</span></span>

          <div className="mt-6 bg-brand-light border border-brand/30 rounded-2xl p-4 text-sm text-left">

          </div>

          <div className="mt-7 flex flex-col sm:flex-row gap-3 justify-center">
            <a href={WHATSAPP} target="_blank" rel="noopener" className="inline-flex items-center justify-center gap-2 border-2 border-green-500 text-green-600 hover:bg-green-50 font-bold text-sm rounded-full px-6 py-3 transition-colors">
              <svg viewBox="0 0 24 24" className="w-4 h-4" fill="currentColor"><path d="M12 2a10 10 0 0 0-8.6 15.1L2 22l5-1.3A10 10 0 1 0 12 2zm5 13.9c-.2.6-1.2 1.1-1.7 1.2-.4.1-1 .1-1.6-.1a13 13 0 0 1-5.7-5 6 6 0 0 1-1.2-3c0-.6.2-1.2.6-1.6.2-.3.5-.4.7-.4h.5c.2 0 .4 0 .6.4l.8 2c.1.2.1.4 0 .6l-.4.6c-.2.2-.3.4-.1.7.5.8 1.1 1.5 1.8 2.1.6.5 1.2.9 1.9 1.2.3.1.5.1.7-.1l.6-.7c.2-.2.4-.3.6-.2l2 1c.2.1.4.2.4.3.1.3.1.7-.2 1z" /></svg>
              ¿Tienes dudas? Escríbenos
            </a>
            <button onClick={() => navigate('home')} className="bg-brand hover:bg-brand-dark text-white font-bold text-sm rounded-full px-8 py-3 transition-colors">
              Seguir comprando

          </div>
        </div>
      </main>
    );
  }

  return (
    <main className="page-enter max-w-7xl mx-auto px-4 mt-8">
      <Stepper step={step} />
      <div className="grid lg:grid-cols-3 gap-6 items-start">
        <div className="lg:col-span-2">
          {/* ====== STEP 1 — ENTREGA ====== */}
          {step === 1 && (
            <div className="bg-white border border-neutral-200 rounded-2xl p-5 md:p-7">
              <h1 className="text-xl font-extrabold mb-5">¿Cómo quieres recibir tu pedido?</h1>
              <div className="grid grid-cols-2 gap-3 mb-6">
                {[{ id: 'retiro', icon: '🏪', label: 'Retiro en tienda' }, { id: 'envio', icon: '🚚', label: 'Envío a domicilio' }].map((m) => (
                  <button key={m.id} onClick={() => setMode(m.id)}
                    className={'rounded-2xl border-2 p-4 text-sm font-bold flex flex-col items-center gap-1.5 transition-colors ' +
                      (mode === m.id ? 'border-brand bg-brand-light text-brand-dark' : 'border-neutral-200 hover:border-neutral-300')}>
                    <span className="text-2xl">{m.icon}</span>{m.label}

              <div className="grid sm:grid-cols-2 gap-3.5 mb-5">
                <div>
                  <label className="text-xs font-bold text-neutral-500 uppercase tracking-wide">Nombre completo</label>

              {mode === 'envio' ? (
                <div className="grid sm:grid-cols-2 gap-3.5">
                  <div className="sm:col-span-2">
                    <label className="text-xs font-bold text-neutral-500 uppercase tracking-wide">Dirección</label>

                    <label className="text-xs font-bold text-neutral-500 uppercase tracking-wide">Ciudad</label>
                    <input className={inputCls + ' mt-1'} value={form.ciudad} onChange={set('ciudad')} />
                  </div>
                  <div>
                    <label className="text-xs font-bold text-neutral-500 uppercase tracking-wide">Estado</label>
                    <input className={inputCls + ' mt-1'} value={form.estado} onChange={set('estado')} />
                  </div>
                  <p className="sm:col-span-2 text-xs text-neutral-500">📦 Envío <strong className="text-green-600">gratis</strong> en Caracas. Para envío nacional calcularemos el costo antes de despachar.</p>

                <div>
                  <label className="text-xs font-bold text-neutral-500 uppercase tracking-wide">Elige tu sucursal</label>
                  <div className="grid sm:grid-cols-2 gap-3 mt-2">
                    {STORES.map((s) => (
                      <button key={s.id} onClick={() => setStore(s.id)}
                        className={'text-left rounded-2xl border-2 p-4 transition-colors ' + (store === s.id ? 'border-brand bg-brand-light' : 'border-neutral-200 hover:border-neutral-300')}>
                        <p className="font-extrabold text-sm flex items-center gap-2">📍 {s.name} {store === s.id && <span className="text-brand text-xs">✓ Seleccionada</span>}</p>
                        <p className="text-xs text-neutral-500 mt-1">{s.addr}</p>
                        <p className="text-xs text-neutral-400 mt-1">{s.hours}</p>
                        <p className="text-xs font-bold text-green-600 mt-2">⏱ Listo para retiro en ~2 horas</p>
                      </button>
                    ))}
                  </div>
                </div>
              )}

              <button onClick={() => { if (canStep1) { setStep(2); window.scrollTo({ top: 0 }); } }} disabled={!canStep1}
                className={'mt-7 w-full font-bold rounded-2xl py-4 transition-colors ' + (canStep1 ? 'bg-brand hover:bg-brand-dark text-white shadow-lg shadow-brand/25' : 'bg-neutral-200 text-neutral-400 cursor-not-allowed')}>
                Continuar →
              </button>
              {!canStep1 && <p className="text-xs text-neutral-400 text-center mt-2">Completa tu nombre, teléfono{mode === 'envio' ? ' y dirección' : ''} para continuar</p>}
            </div>
          )}

          {/* ====== STEP 2 — PAGO ====== */}
          {step === 2 && (
            <div className="bg-white border border-neutral-200 rounded-2xl p-5 md:p-7">
              <h1 className="text-xl font-extrabold mb-1">Elige cómo pagar</h1>
              <p className="text-sm text-neutral-500 mb-5">Total a pagar: <strong className="text-brand">{usd(subtotal)}</strong> <span className="text-xs text-neutral-400">| {bsEq(subtotal)}</span></p>

              <div className="space-y-3">
                {PAY_METHODS.map((m) => {
                  const disabled = m.id === 'efectivo' && mode !== 'retiro';
                  const selected = pay === m.id;
                  const isCashea = m.id === 'cashea';
                  return (
                    <div key={m.id}
                      onClick={() => !disabled && setPay(m.id)}
                      className={'rounded-2xl border-2 transition-all ' +
                        (disabled ? 'border-neutral-100 bg-neutral-50 opacity-60 cursor-not-allowed'
                          : selected ? (isCashea ? 'border-yellow-400 bg-yellow-50 cursor-pointer' : 'border-brand bg-brand-light cursor-pointer')
                          : (isCashea ? 'border-yellow-300 bg-yellow-50/50 hover:border-yellow-400 cursor-pointer' : 'border-neutral-200 hover:border-neutral-300 cursor-pointer'))}>
                      <div className="flex items-center gap-3.5 px-4 py-3.5">
                        <span className="text-2xl">{m.icon}</span>
                        <div className="flex-1">
                          <p className="font-bold text-sm flex items-center gap-2">
                            {m.title}
                            {isCashea && <span className="bg-yellow-400 text-black text-[10px] font-extrabold rounded px-1.5 py-0.5">COMPRA AHORA, PAGA DESPUÉS</span>}
                          </p>
                          <p className="text-xs text-neutral-500">{m.sub}</p>
                          {disabled && <p className="text-[11px] text-amber-600 font-semibold mt-0.5">Disponible solo con retiro en tienda</p>}
                        </div>
                        <span className={'w-5 h-5 rounded-full border-2 flex items-center justify-center ' + (selected ? 'border-brand bg-brand' : 'border-neutral-300')}>
                          {selected && <span className="w-2 h-2 rounded-full bg-white"></span>}
                        </span>
                      </div>

                      {selected && !disabled && (
                        <div className="px-4 pb-4 pt-1 border-t border-black/5 text-sm" onClick={(e) => e.stopPropagation()}>
                          {m.id === 'tarjeta' && (
                            <div className="grid grid-cols-2 gap-3 mt-2">
                              <input className={inputCls + ' col-span-2'} placeholder="Número de tarjeta  ····  ····  ····  ····" />
                              <input className={inputCls} placeholder="MM/AA" />
                              <input className={inputCls} placeholder="CVV" />
                              <p className="col-span-2 text-[11px] text-neutral-400">🔒 Pago seguro · Visa, Mastercard y Amex</p>
                            </div>
                          )}
                          {m.id === 'pagomovil' && (
                            <div className="mt-2 space-y-2">
                              <div className="bg-white rounded-xl border border-neutral-200 p-3 text-xs space-y-1">
                                <p><strong>Banco:</strong> Banesco (0134)</p>
                                <p><strong>RIF:</strong> J-404684034</p>
                                <p><strong>Teléfono:</strong> 0412-555-0123</p>
                              </div>
                              <p className="text-[11px] text-neutral-500">📲 Envía tu comprobante por WhatsApp al <strong>+58 412-5550123</strong></p>
                            </div>
                          )}
                          {m.id === 'zelle' && (
                            <div className="mt-2 space-y-2">
                              <div className="bg-white rounded-xl border border-neutral-200 p-3 text-xs">
                                <p><strong>Zelle:</strong> pagos@alkosto.com.ve</p>
                              </div>
                              <p className="text-[11px] text-neutral-500">📲 Envía el comprobante por WhatsApp para confirmar tu pago</p>
                            </div>
                          )}
                          {m.id === 'transferencia' && (
                            <div className="mt-2 space-y-2">
                              <div className="bg-white rounded-xl border border-neutral-200 p-3 text-xs space-y-1">
                                <p><strong>Banesco:</strong> 0134-0000-00-0000000000 · Alkosto C.A.</p>
                                <p><strong>Mercantil:</strong> 0105-0000-00-0000000000 · Alkosto C.A.</p>
                                <p><strong>Venezuela:</strong> 0102-0000-00-0000000000 · Alkosto C.A.</p>
                                <p><strong>RIF:</strong> J-404684034</p>
                              </div>
                              <p className="text-[11px] text-neutral-500">📲 Envía el comprobante por WhatsApp para confirmar tu pago</p>
                            </div>
                          )}
                          {m.id === 'cashea' && (
                            <div className="mt-2 space-y-2">
                              <p className="text-sm"><strong>Inicial desde 20%</strong> + hasta <strong>15 cuotas sin interés</strong></p>
                              <p className="text-xs text-neutral-500">Necesitas tener la app de Cashea activa con cupo disponible.</p>
                              <button onClick={() => setCasheaFaq(!casheaFaq)} className="text-xs font-bold text-yellow-700 hover:text-yellow-800">
                                ¿Cómo funciona Cashea? {casheaFaq ? '▴' : '→'}
                              </button>
                              {casheaFaq && (
                                <div className="bg-white rounded-xl border border-yellow-200 p-3 text-xs space-y-2">
                                  <p><strong>1.</strong> Descarga la app de Cashea y regístrate con tu cédula.</p>
                                  <p><strong>2.</strong> Al confirmar el pedido, escanea el QR que te mostramos en tienda o en línea.</p>
                                  <p><strong>3.</strong> Paga la inicial desde 20% y el resto en cuotas quincenales sin interés.</p>
                                  <p><strong>4.</strong> Tu nivel en Cashea define el número de cuotas (hasta 15).</p>
                                </div>
                              )}
                            </div>
                          )}
                          {m.id === 'efectivo' && (
                            <p className="mt-2 text-xs text-neutral-500">Paga en efectivo (USD o Bs.) al retirar en <strong>{STORES.find((s) => s.id === store).name}</strong>. Reservamos tu pedido por 48 horas.</p>
                          )}
                        </div>
                      )}
                    </div>
                  );
                })}
              </div>

              <div className="flex gap-3 mt-7">
                <button onClick={() => { setStep(1); window.scrollTo({ top: 0 }); }} className="px-5 py-4 rounded-2xl border-2 border-neutral-200 font-bold text-sm text-neutral-500 hover:border-neutral-300">← Volver</button>
                <button onClick={() => { if (pay) confirm(); }} disabled={!pay}
                  className={'flex-1 font-bold rounded-2xl py-4 transition-colors ' + (pay ? 'bg-brand hover:bg-brand-dark text-white shadow-lg shadow-brand/25' : 'bg-neutral-200 text-neutral-400 cursor-not-allowed')}>
                  Confirmar pedido
                </button>
              </div>
              {!pay && <p className="text-xs text-neutral-400 text-center mt-2">Selecciona un método de pago para confirmar</p>}
            </div>
          )}
        </div>
        {summary()}
      </div>
    </main>
  );
}

/* ============================== APP SHELL ============================== */
function Toast({ toast }) {
  if (!toast) return null;
  return (
    <div className="toast-enter fixed bottom-5 left-1/2 -translate-x-1/2 z-50 bg-ink text-white text-sm font-semibold rounded-full px-5 py-3 shadow-xl flex items-center gap-2">
      <span className="text-green-400">✓</span> {toast}
    </div>
  );
}

function App() {
  const [page, setPage] = useState({ name: 'home' });
  const [cart, setCart] = useState([]);
  const [wish, setWish] = useState([]);
  const [toast, setToast] = useState(null);
  const [search, setSearch] = useState('');
  const [myStore, setMyStore] = useState(null);

  const navigate = (name, opts = {}) => { setPage({ name, ...opts, key: Date.now() }); window.scrollTo({ top: 0 }); };

  const showToast = (msg) => {
    setToast(msg);
    clearTimeout(window.__toastT);
    window.__toastT = setTimeout(() => setToast(null), 2200);
  };

  const addToCart = (id) => {
    setCart((c) => {
      const f = c.find((l) => l.id === id);
      return f ? c.map((l) => (l.id === id ? { ...l, qty: l.qty + 1 } : l)) : [...c, { id, qty: 1 }];
    });
    showToast('Agregado al carrito');
  };
  const setQty = (id, qty) => setCart((c) => (qty <= 0 ? c.filter((l) => l.id !== id) : c.map((l) => (l.id === id ? { ...l, qty } : l))));
  const removeFromCart = (id) => setCart((c) => c.filter((l) => l.id !== id));
  const clearCart = () => setCart([]);
  const toggleWish = (id) => setWish((w) => (w.includes(id) ? w.filter((x) => x !== id) : [...w, id]));

  const ctx = { navigate, cart, addToCart, setQty, removeFromCart, clearCart, wish, toggleWish, search, setSearch, myStore, setMyStore, showToast };

  return (
    <Ctx.Provider value={ctx}>
      <div className="min-h-screen flex flex-col">
        <Navbar />
        <div className="flex-1" key={page.key}>
          {page.name === 'home' && <Home />}
          {page.name === 'category' && <CategoryPage cat={page.cat} query={page.query} ofertas={page.ofertas} />}
          {page.name === 'product' && <ProductDetail id={page.id} />}
          {page.name === 'cart' && <CartPage />}
          {page.name === 'checkout' && <Checkout />}
          {page.name === 'wishlist' && <WishlistPage />}
        </div>
        <Footer />
        <WhatsAppFab />
        <Toast toast={toast} />
      </div>
    </Ctx.Provider>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
